<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | ROX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

background:#f5f5f7;

color:#111;

line-height:1.6;

}

header{

position:sticky;

top:0;

display:flex;

justify-content:space-between;

align-items:center;

padding:22px 8%;

background:rgba(255,255,255,.85);

backdrop-filter:blur(18px);

border-bottom:1px solid #ececec;

}

.logo{

font-size:30px;

font-weight:700;

letter-spacing:10px;

}

nav{

display:flex;

gap:28px;

}

nav a{

text-decoration:none;

color:#666;

transition:.3s;

}

nav a:hover{

color:#111;

}

.hero{

padding:90px 8%;

text-align:center;

}

.hero h1{

font-size:72px;

margin-bottom:20px;

}

.hero p{

max-width:700px;

margin:auto;

font-size:22px;

color:#666;

}

.section{

padding:0 8% 80px;

}

.card{

background:white;

border-radius:32px;

padding:40px;

max-width:1100px;

margin:auto;

box-shadow:0 18px 60px rgba(0,0,0,.08);

}
